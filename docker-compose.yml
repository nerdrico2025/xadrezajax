services:
  # ─────────────────────────────────────────
  # Banco de dados
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xadrez_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xadrez_network

  # ─────────────────────────────────────────
  # Cache / Filas (pronto para uso futuro)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xadrez_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - xadrez_network

  # ─────────────────────────────────────────
  # Backend Django
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xadrez_backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - xadrez_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # API Node.js (Stockfish / Game Engine)
  # ─────────────────────────────────────────
  node-api:
    build:
      context: ./node-api
      dockerfile: Dockerfile
    container_name: xadrez_node
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./node-api/src:/app/src
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - xadrez_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────
  # Mobile React Native / Expo (Metro Bundler)
  # Roda localmente: cd mobile && npx expo start --host lan
  # ─────────────────────────────────────────
  mobile:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: xadrez_mobile
    restart: unless-stopped
    profiles:
      - mobile
    env_file: .env
    volumes:
      - ./mobile:/app
      - mobile_node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
      - REACT_NATIVE_PACKAGER_HOSTNAME=${HOST_IP:-localhost}
    networks:
      - xadrez_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ─────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  mobile_node_modules:

# ─────────────────────────────────────────
# Rede interna
# ─────────────────────────────────────────
networks:
  xadrez_network:
    driver: bridge
