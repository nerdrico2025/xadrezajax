name: CI — Lint, Tests & Build

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main, dev]

jobs:
  # ─────────────────────────────────────────
  # Lint — Django (Black + Flake8)
  # ─────────────────────────────────────────
  lint-backend:
    name: Lint Backend (Black + Flake8)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar ferramentas de lint
        run: pip install "black==25.11.0" flake8

      - name: Black — verificação de formatação
        run: black --check --diff backend/

      - name: Flake8 — análise estática
        run: flake8 backend/ --max-line-length=88 --extend-ignore=E203,W503

  # ─────────────────────────────────────────
  # Testes Django + PostgreSQL
  # ─────────────────────────────────────────
  test-backend:
    name: Tests Backend (Django + PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xadrez_db_test
          POSTGRES_USER: xadrez_user
          POSTGRES_PASSWORD: xadrez_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: "django-insecure-ci-only-key"
      DEBUG: "True"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DB_NAME: xadrez_db_test
      DB_USER: xadrez_user
      DB_PASSWORD: xadrez_password
      DB_HOST: localhost
      DB_PORT: "5432"
      REDIS_URL: "redis://localhost:6379/0"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências
        run: pip install -r backend/requirements.txt

      - name: Aplicar migrações
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Rodar testes
        working-directory: backend
        run: python manage.py test --verbosity=2

  # ─────────────────────────────────────────
  # Lint — Node API (ESLint)
  # ─────────────────────────────────────────
  lint-node:
    name: Lint Node API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: node-api/package-lock.json

      - name: Instalar dependências
        working-directory: node-api
        run: npm ci

  # ─────────────────────────────────────────
  # Build Docker — verifica que as imagens constroem
  # ─────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, lint-node]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: xadrez/backend:ci

      - name: Build node-api image
        uses: docker/build-push-action@v5
        with:
          context: ./node-api
          push: false
          tags: xadrez/node-api:ci
