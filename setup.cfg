[flake8]
# Keep this config at repo root so flake8 always picks it up,
# regardless of where it is invoked from.
max-line-length = 88
extend-ignore = E203, W503
exclude =
    .venv,
    backend/.venv,
    __pycache__,
    migrations,
    backend/manage.py

[tool:pytest]
DJANGO_SETTINGS_MODULE = core.settings

