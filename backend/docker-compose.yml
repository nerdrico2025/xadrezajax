version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: chess_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # redis:                        
  #   container_name: chess_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data: